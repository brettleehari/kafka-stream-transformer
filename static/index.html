<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kafka Config & Live Stream</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 700px;
            margin: 0 auto;
        }
        .top, .bottom {
            width: 100%;
            box-sizing: border-box;
        }
        .top {
            background: #fff;
            box-shadow: 0 2px 8px #e0e6ed;
            border-radius: 0 0 12px 12px;
            padding: 2rem 2rem 1.5rem 2rem;
            margin-bottom: 2rem;
        }
        .bottom {
            background: #f4f6fb;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }
        h1 {
            color: #2d3a4b;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 1rem;
            color: #3a4a5d;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cfd8dc;
            border-radius: 4px;
            margin-top: 0.25rem;
            font-size: 1rem;
        }
        button {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        #status {
            margin-top: 1rem;
            color: #e11d48;
            font-weight: 500;
        }
        .stream-box {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #e0e6ed;
            padding: 1.5rem;
            min-height: 200px;
            max-height: 50vh;
            overflow-y: auto;
            font-family: 'Fira Mono', 'Consolas', monospace;
            font-size: 1rem;
            color: #22223b;
        }
        @media (max-width: 700px) {
            .container {
                max-width: 100vw;
            }
            .top, .bottom {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top">
            <h1>Kafka Subscription</h1>
            <form id="kafka-form">
                <label>Server:
                    <input type="text" name="server" value="localhost:9092" required>
                </label>
                <label>Topic:
                    <input type="text" name="topic" value="test_topic" required>
                </label>
                <label>Group ID:
                    <input type="text" name="group_id" value="test_group" required>
                </label>
                <button type="submit">Connect & Subscribe</button>
                <button type="button" id="check-kafka" style="margin-left:1rem;background:#10b981;">Check Kafka Server</button>
            </form>
            <div id="status"></div>
        </div>
        <div class="bottom">
            <h1 style="margin-top:0;">Live Kafka Streams</h1>
            <div class="stream-box" id="raw-stream">
                <b>Raw Kafka Message Stream</b>
                <div id="raw-stream-content"><span style="color:#888;">No data yet. Connect to see live stream.</span></div>
            </div>
            <div class="stream-box" id="transformed-stream" style="margin-top:1.5rem;">
                <b>Transformed Message Stream</b>
                <div id="transformed-stream-content"><span style="color:#888;">No data yet. Connect to see live stream.</span></div>
            </div>
        </div>
    </div>
    <script>
    let ws;
    document.getElementById('kafka-form').onsubmit = async function(e) {
        e.preventDefault();
        const form = new FormData(e.target);
        const config = Object.fromEntries(form.entries());
        const res = await fetch('/connect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(config)
        });
        let data;
        try {
            data = await res.json();
        } catch (e) {
            document.getElementById('status').innerText = 'Invalid response from server.';
            return;
        }
        if (res.ok) {
            document.getElementById('status').innerText = data.status;
            startWebSocket();
        } else {
            const msg = data && data.detail ? data.detail : 'Kafka connection failed. Please check your server, topic, and group ID.';
            document.getElementById('status').innerText = msg;
        }
    };

    document.getElementById('check-kafka').onclick = async function() {
        const form = new FormData(document.getElementById('kafka-form'));
        const config = Object.fromEntries(form.entries());
        let res, data;
        try {
            res = await fetch('/check-kafka', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(config)
            });
            data = await res.json();
        } catch (e) {
            document.getElementById('status').innerText = 'Kafka server is not accessible or the backend is not running. Please check your server, topic, group ID, and backend logs.';
            return;
        }
        if (res.ok) {
            document.getElementById('status').innerText = data.status;
        } else {
            const msg = data && data.detail ? data.detail : 'Kafka server is not accessible. Please check your server, topic, and group ID.';
            document.getElementById('status').innerText = msg;
        }
    };

    function startWebSocket() {
        if (ws) ws.close();
        ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onopen = () => {
            document.getElementById('raw-stream-content').innerHTML = '<span style="color:#888;">Waiting for messages...</span>';
            document.getElementById('transformed-stream-content').innerHTML = '<span style="color:#888;">Waiting for messages...</span>';
        };
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const pretty = JSON.stringify(data.raw, null, 2);
            const transformed = JSON.stringify(data.transformed, null, 2);
            document.getElementById('raw-stream-content').innerHTML = `<pre>${pretty}</pre>`;
            document.getElementById('transformed-stream-content').innerHTML = `<pre>${transformed}</pre>`;
        };
        ws.onerror = () => {
            document.getElementById('raw-stream-content').innerHTML = '<span style="color:#e11d48;">WebSocket error. Please check your connection.</span>';
            document.getElementById('transformed-stream-content').innerHTML = '<span style="color:#e11d48;">WebSocket error. Please check your connection.</span>';
        };
        ws.onclose = () => {
            document.getElementById('raw-stream-content').innerHTML = '<span style="color:#888;">WebSocket closed. Reconnect to see live stream.</span>';
            document.getElementById('transformed-stream-content').innerHTML = '<span style="color:#888;">WebSocket closed. Reconnect to see live stream.</span>';
        };
    }
    </script>
</body>
</html>
